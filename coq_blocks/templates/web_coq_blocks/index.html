{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Snapping</title>

    <!-- SVG Icon -->
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">

    <!-- Interact.js -->
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- Own styles -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'web_coq_blocks/my_styles.css' %}">

</head>
<body>
    
    <div id="alertPlaceholder"></div>

    <div class="d-flex vh-100 overflow-hidden">

        <div id="ground" class="flex-grow-1 position-relative bg-light overflow-auto" style="height: 100%;"></div>

        <!-- ------------------- SIDEBAR ------------------- -->
        <div class="card d-flex flex-column p-3 overflow-hidden bg-white shadow-sm" style="width: 350px; min-width: 350px; height: 100%;">
            <!-- --------- HEADER  --------- -->                
                <h3 class="d-flex align-items-center gap-2">
                    <img src="{% static 'favicon.svg' %}" alt="App Logo" width="42" height="42">
                    VisualCoq</h3>
    
            <!-- --------- BODY --------- -->
            <div class="flex-grow-1 overflow-auto border-top pt-2">
    
                <div class="d-flex justify-content-between mb-2 align-items-center">
                    
                    <div>
                        <h5 id="headerSavedTypes" style="color: rgb(33, 37, 41);" class="d-flex align-items-center gap-2 m-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-floppy" viewBox="0 0 16 16">
                                <path d="M11 2H9v3h2z"/><path d="M1.5 0h11.586a1.5 1.5 0 0 1 1.06.44l1.415 1.414A1.5 1.5 0 0 1 16 2.914V14.5a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 14.5v-13A1.5 1.5 0 0 1 1.5 0M1 1.5v13a.5.5 0 0 0 .5.5H2v-4.5A1.5 1.5 0 0 1 3.5 9h9a1.5 1.5 0 0 1 1.5 1.5V15h.5a.5.5 0 0 0 .5-.5V2.914a.5.5 0 0 0-.146-.353l-1.415-1.415A.5.5 0 0 0 13.086 1H13v4.5A1.5 1.5 0 0 1 11.5 7h-7A1.5 1.5 0 0 1 3 5.5V1H1.5a.5.5 0 0 0-.5.5m3 4a.5.5 0 0 0 .5.5h7a.5.5 0 0 0 .5-.5V1H4zM3 15h10v-4.5a.5.5 0 0 0-.5-.5h-9a.5.5 0 0 0-.5.5z"/>
                            </svg>
                            Saved Types
                        </h5>

                        <h5 id="headerExports" style="color: rgb(33, 37, 41);"  class="d-flex align-items-center gap-2 m-0 d-none">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-up-right" viewBox="0 0 16 16">
                                <path fill-rule="evenodd" d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5"/>
                                <path fill-rule="evenodd" d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0z"/>
                            </svg>
                            Exports
                        </h5>
                    </div>

                    <div class="btn-group btn-group-sm" role="group">
                        <input type="radio" class="btn-check" name="btnradio" id="showSavedTypesBtn" autocomplete="off" checked 
                            onclick="
                                document.getElementById('savedTypesDiv').classList.remove('d-none'); 
                                document.getElementById('exportsDiv').classList.add('d-none');
                                document.getElementById('headerSavedTypes').classList.remove('d-none');
                                document.getElementById('headerExports').classList.add('d-none');
                            ">
                        <label class="btn btn-outline-success d-flex align-items-center justify-content-center" for="showSavedTypesBtn" title="Show Saved Types">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-floppy" viewBox="0 0 16 16">
                                <path d="M11 2H9v3h2z"/><path d="M1.5 0h11.586a1.5 1.5 0 0 1 1.06.44l1.415 1.414A1.5 1.5 0 0 1 16 2.914V14.5a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 14.5v-13A1.5 1.5 0 0 1 1.5 0M1 1.5v13a.5.5 0 0 0 .5.5H2v-4.5A1.5 1.5 0 0 1 3.5 9h9a1.5 1.5 0 0 1 1.5 1.5V15h.5a.5.5 0 0 0 .5-.5V2.914a.5.5 0 0 0-.146-.353l-1.415-1.415A.5.5 0 0 0 13.086 1H13v4.5A1.5 1.5 0 0 1 11.5 7h-7A1.5 1.5 0 0 1 3 5.5V1H1.5a.5.5 0 0 0-.5.5m3 4a.5.5 0 0 0 .5.5h7a.5.5 0 0 0 .5-.5V1H4zM3 15h10v-4.5a.5.5 0 0 0-.5-.5h-9a.5.5 0 0 0-.5.5z"/>
                            </svg>
                        </label>

                        <input type="radio" class="btn-check" name="btnradio" id="showExportsBtn" autocomplete="off" 
                            onclick="
                                document.getElementById('savedTypesDiv').classList.add('d-none'); 
                                document.getElementById('exportsDiv').classList.remove('d-none');
                                document.getElementById('headerSavedTypes').classList.add('d-none');
                                document.getElementById('headerExports').classList.remove('d-none');
                            ">
                        <label class="btn btn-outline-success d-flex align-items-center justify-content-center" for="showExportsBtn" title="Show Exports">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-up-right" viewBox="0 0 16 16">
                                <path fill-rule="evenodd" d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5"/>
                                <path fill-rule="evenodd" d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0z"/>
                            </svg>
                        </label>
                    </div>

                </div>

                <div class="flex-grow-1 overflow-auto">
                    <div id="savedTypesDiv">
                        <div class="accordion">
    
                            <div class="accordion-item mb-2">
                                <h5 class="accordion-header d-flex bg-light-subtle">
                                    <button id="atomicTypesAccordionButton" class="accordion-button bg-light-subtle px-3 text-success-emphasis" style="font-weight: 600;" type="button" data-bs-toggle="collapse" data-bs-target="#atomicTypesAccordion">
                                        Atomic Types
                                    </button>
                                </h5>
                                <div id="atomicTypesAccordion" class="accordion-collapse collapse">
                                    <div class="accordion-body p-0">
                                        <ul id="atomicTypesList" class="list-group"></ul>
                                    </div>
                                </div>
                            </div>
    
                            <div class="accordion-item">
                                <h5 class="accordion-header d-flex bg-light-subtle">
                                    <button id="importedTypesAccordionButton" class="accordion-button bg-light-subtle px-3 text-success-emphasis" style="font-weight: 600;" type="button" data-bs-toggle="collapse" data-bs-target="#importedTypesAccordion">
                                        Imported Types
                                    </button>
                                    <button id="showImportedModalBtn" class="btn btn-success btn-sm m-1 d-flex align-items-center" data-bs-toggle="modal" data-bs-target="#importedTypeModal" title="Create New Imported Type">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-journal-plus" viewBox="0 0 16 16">
                                            <path fill-rule="evenodd" d="M8 5.5a.5.5 0 0 1 .5.5v1.5H10a.5.5 0 0 1 0 1H8.5V10a.5.5 0 0 1-1 0V8.5H6a.5.5 0 0 1 0-1h1.5V6a.5.5 0 0 1 .5-.5"/>
                                            <path d="M3 0h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2v-1h1v1a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v1H1V2a2 2 0 0 1 2-2"/>
                                            <path d="M1 5v-.5a.5.5 0 0 1 1 0V5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1zm0 3v-.5a.5.5 0 0 1 1 0V8h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1zm0 3v-.5a.5.5 0 0 1 1 0v.5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1z"/>
                                        </svg>
                                    </button>
                                </h5>
                                <div id="importedTypesAccordion" class="accordion-collapse collapse">
                                    <div class="accordion-body p-0">
                                        <div id="importedTypesList"></div>
                                    </div>
                                </div>
                            </div>
    
                        </div>
                    </div>
                    
                    <div id="exportsDiv" class="d-none">
                        <ul id="result" class="list-group list-group-flush list-group-numbered"></ul>
                    </div>
                </div>
            </div>
    
            <!-- --------- FOOTER CONTROL PANEL --------- -->
            <div class="mt-2 pt-2 border-top">
                <h5 style="color: rgb(33, 37, 41);"  class="d-flex align-items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-sliders" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M11.5 2a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3M9.05 3a2.5 2.5 0 0 1 4.9 0H16v1h-2.05a2.5 2.5 0 0 1-4.9 0H0V3zM4.5 7a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3M2.05 8a2.5 2.5 0 0 1 4.9 0H16v1H6.95a2.5 2.5 0 0 1-4.9 0H0V8zm9.45 4a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3m-2.45 1a2.5 2.5 0 0 1 4.9 0H16v1h-2.05a2.5 2.5 0 0 1-4.9 0H0v-1z"/>
                    </svg>
                    Control Panel:
                </h5>

                <div class="d-flex justify-content-between align-items-center">

                    <div class="d-flex gap-3 align-items-center">
        
                        <svg id="newDefBtn" 
                            class="text-success" 
                            style="cursor: pointer; transition: transform 0.1s, color 0.2s;"
                            onmouseover="this.classList.replace('text-success', 'text-success-emphasis'); this.style.transform='scale(1.1)'" 
                            onmouseout="this.classList.replace('text-success-emphasis', 'text-success'); this.style.transform='scale(1)'"
                            xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                            <title>New Definition Block</title>
                            <path d="M11 2a3 3 0 0 1 3 3v6a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3V5a3 3 0 0 1 3-3zM5 1a4 4 0 0 0-4 4v6a4 4 0 0 0 4 4h6a4 4 0 0 0 4-4V5a4 4 0 0 0-4-4z"/>
                        </svg>
        
                        <svg id="clearPlaygroundBtn" 
                            class="text-danger" 
                            style="cursor: pointer; transition: transform 0.1s, color 0.2s;"
                            onmouseover="this.classList.replace('text-danger', 'text-danger-emphasis'); this.style.transform='scale(1.1)'" 
                            onmouseout="this.classList.replace('text-danger-emphasis', 'text-danger'); this.style.transform='scale(1)'"
                            xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                            <title>Clear Playground</title>
                            <path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47M8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5"/>
                        </svg>
                        

                        <svg id="globalSettingBtn"
                            class="text-secondary"
                            data-bs-toggle="modal" 
                            data-bs-target="#globalSettingModal" 
                            style="cursor: pointer; transition: transform 0.1s, color 0.2s;"
                            onmouseover="this.classList.replace('text-secondary', 'text-secondary-emphasis'); this.style.transform='scale(1.1)'" 
                            onmouseout="this.classList.replace('text-secondary-emphasis', 'text-secondary'); this.style.transform='scale(1)'"
                            xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-gear" viewBox="0 0 16 16">
                            <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492M5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0"/>
                            <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115z"/>
                            <title>Global Settings</title>
                        </svg>
                    </div>

                    <div>
                        <svg id="infoBtn"
                            class="text-success"
                            data-bs-toggle="modal" 
                            data-bs-target="#infoModal" 
                            style="cursor: pointer; transition: transform 0.1s, color 0.2s;"
                            onmouseover="this.classList.replace('text-success', 'text-success-emphasis'); this.style.transform='scale(1.1)'" 
                            onmouseout="this.classList.replace('text-success-emphasis', 'text-success'); this.style.transform='scale(1)'" 
                            xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-info-circle" viewBox="0 0 16 16">
                            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
                            <path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0"/>
                        </svg>
                    </div>
    
                    

                </div>
                
            </div>
        </div>
    </div>

    <!-- ------------------- MODALS ------------------- -->
    <!-- Setting Modal -->
    <div class="modal fade" id="settingModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="settingModalTitle"></h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="settingModalBody">
                    
                </div>
                <div class="modal-footer p-1">
                    <button type="button" class="btn btn-success" id="settingModalSaveBtn" data-bs-dismiss="modal">Save changes</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Imported Type Modal -->
    <div class="modal fade" id="importedTypeModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-upload" viewBox="0 0 16 16">
                            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
                            <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708z"/>
                    </svg>
                    
                    <h1 class="modal-title fs-5 ms-3">Import Type</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label for="defInput" class="form-label fw-semibold">Enter new type:</label>
                    <textarea id="defInput" class="form-control" style="min-height: 400px;"></textarea>
                </div>
                <div class="modal-footer p-1">
                    <button id="loadBtn" class="btn btn-success" data-bs-dismiss="modal">Create</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Setting Modal -->
    <div class="modal fade" id="globalSettingModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="globalSettingModalTitle">Global Settings</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="globalSettingModalBody">
                    <h6>Export Settings:
                    </h6>
                    
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="forceExplicitAtCheckbox" checked>
                        <label class="form-check-label d-flex align-items-center">
                            Force explicit arguments with @
                            <svg id="info-global-at-btn"
                                data-bs-toggle="popover" data-bs-title="Force explicit arguments with @" 
                                data-bs-content="While the parser supports implicit types, the code generator exclusively outputs explicit arguments. Enabling this setting prepends the @ symbol, forcing Coq to correctly evaluate the explicit arguments regardless of their original implicit/explicit definition."
                                data-bs-placement="right"
                                data-bs-html="true" 
                                data-bs-trigger="click"
                                class="text-info ms-2" 
                                style="cursor: pointer; transition: transform 0.1s, color 0.2s;" 
                                xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-info-square" viewBox="0 0 16 16">
                                <path d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z"/>
                                <path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0"/>
                            </svg>
                        </label>
                    </div>

                </div>
                <div class="modal-footer p-1">
                    <button type="button" class="btn btn-success" id="globalSettingModalSaveBtn" data-bs-dismiss="modal">Save changes</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Info Modal -->
    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" style="min-width: 900px; max-width: calc(100vw - 24rem); height: 90vh;">
            <div class="modal-content" style="min-width: 900px; max-width: none; height: 90vh; overflow: hidden;">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="infoModalTitle">VisualCOQ Interface Overview</h1>  
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
